version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    versioning-strategy: lockfile-only
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore"
    cooldown:
      default-days: 7
    groups:
      tauri-plugins:
        patterns:
          - "@tauri-apps/*"
      radix-ui:
        patterns:
          - "@radix-ui/*"
      dev-tools:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "typescript"
          - "eslint"
          - "prettier*"
          - "postcss"
          - "tailwindcss"
          - "autoprefixer"
    open-pull-requests-limit: 10

  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore"
    cooldown:
      default-days: 7
    groups:
      tauri:
        patterns:
          - "tauri*"
          - "tauri-*"
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
